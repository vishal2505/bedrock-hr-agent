name: Terraform Apply

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    outputs:
      agent_id: ${{ steps.outputs.outputs.agent_id }}
      agent_alias_id: ${{ steps.outputs.outputs.agent_alias_id }}
      frontend_url: ${{ steps.outputs.outputs.frontend_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="sender_email=${{ secrets.SENDER_EMAIL }}"

      - name: Capture Outputs
        id: outputs
        run: |
          echo "agent_id=$(terraform output -raw bedrock_agent_id)" >> $GITHUB_OUTPUT
          echo "agent_alias_id=$(terraform output -raw bedrock_agent_alias_id)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT
