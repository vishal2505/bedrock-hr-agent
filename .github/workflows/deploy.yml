name: Deploy

# Manual-only. Runs the full deploy pipeline:
#   1. terraform apply  (provisions / updates AWS infra)
#   2. deploy backend   (build + push Docker image to ECR, update App Runner)
#   3. deploy frontend  (build React app, sync to S3, invalidate CloudFront)
#
# Backend and frontend deploys run in parallel after terraform finishes.
on:
  workflow_dispatch:
    inputs:
      skip_backend:
        description: "Skip backend deploy"
        type: boolean
        default: false
      skip_frontend:
        description: "Skip frontend deploy"
        type: boolean
        default: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hr-onboarding-backend

jobs:
  # -------------------------------------------------------------------------
  # 1. Terraform Apply
  # -------------------------------------------------------------------------
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    outputs:
      agent_id: ${{ steps.outputs.outputs.agent_id }}
      agent_alias_id: ${{ steps.outputs.outputs.agent_alias_id }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      frontend_url: ${{ steps.outputs.outputs.frontend_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="sender_email=${{ secrets.SENDER_EMAIL }}"

      - name: Capture Outputs
        id: outputs
        run: |
          echo "agent_id=$(terraform output -raw bedrock_agent_id)" >> $GITHUB_OUTPUT
          echo "agent_alias_id=$(terraform output -raw bedrock_agent_alias_id)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT

  # -------------------------------------------------------------------------
  # 2. Deploy Backend (Docker image -> ECR -> App Runner)
  # -------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend
    needs: terraform
    if: ${{ !inputs.skip_backend }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f backend/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update App Runner service
        run: |
          aws apprunner update-service \
            --service-arn ${{ secrets.APPRUNNER_SERVICE_ARN }} \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "${{ steps.build-image.outputs.image }}",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "8000",
                  "RuntimeEnvironmentVariables": {
                    "AWS_REGION": "${{ env.AWS_REGION }}",
                    "BEDROCK_AGENT_ID": "${{ needs.terraform.outputs.agent_id }}",
                    "BEDROCK_AGENT_ALIAS_ID": "${{ needs.terraform.outputs.agent_alias_id }}",
                    "DYNAMODB_TABLE_NAME": "OnboardingTasks"
                  }
                }
              }
            }'

  # -------------------------------------------------------------------------
  # 3. Deploy Frontend (Vite build -> S3 -> CloudFront invalidation)
  # -------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    needs: terraform
    if: ${{ !inputs.skip_frontend }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ needs.terraform.outputs.frontend_bucket }} --delete

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Print frontend URL
        run: echo "Frontend deployed to ${{ needs.terraform.outputs.frontend_url }}"
