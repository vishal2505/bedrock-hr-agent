name: Deploy

# One-click full deploy:
#   1. terraform apply (creates ECR + all infra except App Runner)
#   2. build & push backend Docker image to ECR
#   3. terraform apply -var enable_backend_service=true (creates App Runner)
#   4. build & deploy frontend to S3 (using App Runner URL as VITE_API_URL)
#
# After the first run, subsequent runs are idempotent — terraform updates
# in place and App Runner auto-deploys when a new :latest image is pushed.
on:
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: 'Skip frontend deploy'
        type: boolean
        default: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Full Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          missing=()
          [ -z "$SENDER_EMAIL" ] && missing+=("SENDER_EMAIL")
          [ -z "$AWS_ACCESS_KEY_ID" ] && missing+=("AWS_ACCESS_KEY_ID")
          [ -z "$AWS_SECRET_ACCESS_KEY" ] && missing+=("AWS_SECRET_ACCESS_KEY")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      # ---- PASS 1: create ECR + everything except App Runner ---------------
      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init

      - name: Terraform Apply (pass 1 — infra + ECR)
        working-directory: infrastructure
        env:
          TF_VAR_sender_email: ${{ secrets.SENDER_EMAIL }}
        run: terraform apply -auto-approve -var="enable_backend_service=false"

      - name: Capture ECR + frontend bucket from terraform
        id: tf1
        working-directory: infrastructure
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT

      # ---- Build + push backend image to ECR --------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        env:
          ECR_URL: ${{ steps.tf1.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_URL:$IMAGE_TAG -f backend/Dockerfile .
          docker tag $ECR_URL:$IMAGE_TAG $ECR_URL:latest
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest

      # ---- PASS 2: create / update App Runner service ----------------------
      - name: Terraform Apply (pass 2 — App Runner)
        working-directory: infrastructure
        env:
          TF_VAR_sender_email: ${{ secrets.SENDER_EMAIL }}
        run: terraform apply -auto-approve -var="enable_backend_service=true"

      - name: Capture backend URL
        id: tf2
        working-directory: infrastructure
        run: |
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT

      # ---- Frontend build + deploy -----------------------------------------
      - name: Setup Node.js
        if: ${{ !inputs.skip_frontend }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: ${{ !inputs.skip_frontend }}
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        if: ${{ !inputs.skip_frontend }}
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.tf2.outputs.backend_url }}
        run: npm run build

      - name: Deploy frontend to S3
        if: ${{ !inputs.skip_frontend }}
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.tf1.outputs.frontend_bucket }} --delete

      # ---- Summary --------------------------------------------------------
      - name: Print URLs
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend (App Runner)**: ${{ steps.tf2.outputs.backend_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend (S3)**: ${{ steps.tf2.outputs.frontend_url }}" >> $GITHUB_STEP_SUMMARY
